<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Keszthelyi Vajda János Gimnázium - Vajda-napok 2026">
    <meta property="og:title" content="404 - Az oldal elveszett - Las Vajda">
    <meta property="og:description" content="Keszthelyi Vajda János Gimnázium - Vajda-napok 2026">
    <meta property="og:image" content="https://lasvajda.web.app/images/og-image.png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <title>404 - Az oldal elveszett - Las Vajda</title>

    <link rel="icon" type="image/png" href="/images/icons/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/images/icons/favicon.svg" />
    <link rel="shortcut icon" href="/images/icons/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/images/icons/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="Las Vajda" />
    <link rel="manifest" href="/images/icons/site.webmanifest" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;600&family=JetBrains+Mono:wght@300;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/variables.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background: var(--black);
            color: var(--white);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            cursor: default;
        }

        /* ── NOISE OVERLAY ── */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 9999;
            opacity: 0.35;
        }

        /* ── HERO ── */
        .hero {
            position: relative;
            height: 100vh;
            min-height: 600px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* animated radial background */
        .hero-bg {
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse 80% 60% at 50% 40%, rgba(139, 0, 0, 0.18) 0%, transparent 70%),
                radial-gradient(ellipse 50% 40% at 20% 80%, rgba(212, 175, 55, 0.08) 0%, transparent 60%),
                radial-gradient(ellipse 60% 50% at 80% 20%, rgba(212, 175, 55, 0.06) 0%, transparent 60%),
                linear-gradient(180deg, #0a0a0a 0%, #0d0d0d 50%, #0a0505 100%);
            animation: bgPulse 8s ease-in-out infinite alternate;
        }

        @keyframes bgPulse {
            0% {
                opacity: 1;
            }

            100% {
                opacity: 0.85;
            }
        }

        /* ── HERO CONTENT ── */
        .hero-content {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 0 20px;
        }

        .hero-title {
            font-family: "JetBrains Mono", sans-serif;
            font-size: clamp(72px, 14vw, 160px);
            font-weight: 300;
            line-height: 0.9;
            letter-spacing: -0.02em;
            opacity: 0;
            animation: fadeUp 1.2s ease forwards 0.6s;
            margin-bottom: 8px;
        }

        .hero-title .las {
            display: block;
            color: var(--white);
            font-style: italic;
        }

        .hero-title .vajda {
            display: block;
            background: linear-gradient(135deg, var(--gold-dark) 0%, var(--gold) 40%, var(--gold-light) 70%, var(--gold) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: shimmer 4s ease-in-out infinite 2s;
            background-size: 200% 100%;
        }

        @keyframes shimmer {

            0%,
            100% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }
        }

        .hero-divider {
            width: 120px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            margin: 32px auto;
            opacity: 0;
            animation: fadeUp 1s ease forwards 1s;
        }

        .hero-subtitle {
            font-family: "Inter", sans-serif;
            font-size: clamp(11px, 1.5vw, 13px);
            letter-spacing: 0.25em;
            color: var(--white-dim);
            text-transform: uppercase;
            opacity: 0;
            animation: fadeUp 1s ease forwards 1.2s;
            margin-bottom: 52px;
        }

        .hero-cta {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 16px 40px;
            border: 1px solid var(--gold);
            color: var(--gold);
            font-family: "Inter", sans-serif;
            font-size: 11px;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            text-decoration: none;
            position: relative;
            overflow: hidden;
            transition: color 0.4s ease;
            opacity: 0;
            animation: fadeUp 1s ease forwards 1.5s;
        }

        .hero-cta::before {
            content: '';
            position: absolute;
            inset: 0;
            background: var(--gold);
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.4s ease;
        }

        .hero-cta:hover::before {
            transform: scaleX(1);
        }

        .hero-cta:hover {
            color: var(--black);
        }

        .hero-cta span {
            position: relative;
            z-index: 1;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <!-- HERO -->
    <section class="hero">
        <div class="hero-bg"></div>

        <div class="hero-content">
            <h1 class="hero-title">
                <span class="las">Error</span>
                <span class="vajda">404</span>
            </h1>
            <div class="hero-divider"></div>
            <p class="hero-subtitle">A keresett oldal nem található vagy áthelyezésre került a hálózatban.</p>
            <a href="/" class="hero-cta">
                <span>Vissza a kezdőlapra</span>
            </a>
        </div>
    </section>
</body>
</html>
